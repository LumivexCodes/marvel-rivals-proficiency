<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marvel Rivals Proficiency Calculator</title>
</head>
<body>
<h1>Marvel Rivals Proficiency Calculator</h1>

<h3>Enter your current proficiency</h3>

<label>Hero:
<select id="heroSelect"><option value="">Select Hero</option></select>
</label><br><br>

<label>Proficiency Level:
<input id="levelInput" type="number" min="1" max="70">
</label><br><br>

<label>Current Proficiency Points:
<input id="pointsInput" type="number" min="0">
</label><br><br>

<label>Goal Level:
<input id="goalInput" type="number" min="1" max="70">
</label>

<h3>Average Stats Per 10 Minutes</h3>

<label>Objective 1 Stat:
<select id="objective1Stat">
<option value="healing">Healing</option>
<option value="damage">Damage</option>
<option value="damage_blocked">Damage Blocked</option>
</select>
</label>
<br>
<input id="objective1Value" type="number" placeholder="Amount per 10 min">

<br><br>

<label>Objective 2 Stat:
<select id="objective2Stat">
<option value="final_hits">Final Hits</option>
<option value="kos">KOs</option>
<option value="ko_assists">KOs & Assists</option>
</select>
</label>
<br>
<input id="objective2Value" type="number" placeholder="Amount per 10 min">

<br><br>

<label>Game Mode:
<select id="modeSelect">
<option value="qmComp">Quick Match / Competitive</option>
<option value="arcade">Arcade</option>
</select>
</label>

<br><br>
<button id="calculateBtn">Calculate</button>

<hr>
<div id="result"></div>

<script src="app.js"></script>
</body>
</html>
