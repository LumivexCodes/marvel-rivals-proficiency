<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marvel Rivals Proficiency Calculator</title>

</head>


<body>


<h1>
    Marvel Rivals Proficiency Calculator
</h1>


<h3>
    Enter your current proficiency
</h3>


<label>
    Hero:
    <select id="heroSelect">
        <option value="">
            Select Hero
        </option>
    </select>
</label>


<br><br>


<label>
    Proficiency Level:
    <input 
        id="levelInput"
        type="number"
        min="1"
        max="70"
    >
</label>


<br><br>


<label>
    Current Proficiency Points:
    <input
        id="pointsInput"
        type="number"
        min="0"
    >
</label>


<br><br>


<label>
    Goal Level:
    <input
        id="goalInput"
        type="number"
        min="1"
        max="70"
    >
</label>


<br><br>


<button id="calculateBtn">
    Calculate
</button>


<hr>


<div id="result">

</div>



<script src="app.js"></script>


</body>

</html>
